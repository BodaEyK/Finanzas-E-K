<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanzas E&amp;K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Overlay para móvil -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout hidden" id="appLayout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">💰</span>
          <span class="logo-text">Finanzas <strong>E&amp;K</strong></span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-section="dashboard">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-section="registro">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </span>
          <span class="nav-label">Transacciones</span>
        </a>
        <a href="#" class="nav-item" data-section="presupuesto">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </span>
          <span class="nav-label">Presupuesto</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">EK</div>
          <div class="user-details">
            <span class="user-name" id="userName">Edgardo &amp; Kiara</span>
            <span class="user-location">Sullana, Perú</span>
          </div>
        </div>
        <button class="btn btn-ghost logout-btn" id="logoutBtn">↪ Cerrar sesión</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
      <!-- HEADER -->
      <header class="app-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
          </button>
          <h1 class="header-title" id="headerTitle">Dashboard</h1>
        </div>
        <div class="header-right">
          <div class="period-selector">
            <select id="selectMes" class="period-select">
              <option value="1">Enero</option>
              <option value="2">Febrero</option>
              <option value="3">Marzo</option>
              <option value="4">Abril</option>
              <option value="5" selected>Mayo</option>
              <option value="6">Junio</option>
              <option value="7">Julio</option>
              <option value="8">Agosto</option>
              <option value="9">Septiembre</option>
              <option value="10">Octubre</option>
              <option value="11">Noviembre</option>
              <option value="12">Diciembre</option>
            </select>
            <select id="selectAnio" class="period-select">
              <option value="2025">2025</option>
              <option value="2026" selected>2026</option>
            </select>
          </div>
          <div class="backend-status" id="backendStatus" title="Estado del backend">
            <span class="status-dot offline"></span>
            <span class="status-label">Local</span>
          </div>
        </div>
      </header>

      <!-- CONTENT AREA -->
      <main class="content-area">
        <!-- DASHBOARD SECTION -->
        <section class="section" id="section-dashboard">
          <div id="dashboard-content"></div>
        </section>

        <!-- REGISTRO SECTION -->
        <section class="section hidden" id="section-registro">
          <div id="registro-content"></div>
        </section>

        <!-- PRESUPUESTO SECTION -->
        <section class="section hidden" id="section-presupuesto">
          <div id="presupuesto-content"></div>
        </section>
      </main>
    </div>
  </div>

  <!-- TOAST NOTIFICATIONS -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Editar Transacción</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/categorias.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/registro.js"></script>
  <script src="js/presupuesto.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
